[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = --cov=strategy --cov=ml --cov=alerts --cov=shared --cov=backtest --cov=tracker --cov=paper_trader --cov-fail-under=58 --cov-report=term-missing  # TODO: raise back to 60 once execution/ coverage added
         --cov-config=.coveragerc
