# Credit Spread Trading System Configuration — EXP-154
# MC-validated champion: 5% directional risk + 12% IC risk (IC-in-NEUTRAL only)
# MC P50 return: +31.1% | P50 max DD: -28.1% | 200/200 seeds positive
# Backtest config: configs/exp_154_risk5_icr12_sl35.json

# Tickers to monitor
tickers:
  - SPY
  - QQQ
  - IWM

# Strategy Parameters
strategy:
  # Days to expiration range for new positions
  # exp_154 backtest: target_dte=35, min_dte=25
  min_dte: 25
  max_dte: 45
  target_dte: 35

  # Manage positions at this DTE or earlier
  manage_dte: 21

  # Strike selection: OTM% mode (use_delta_selection=false, otm_pct=3%)
  use_delta_selection: false
  target_delta: 0.12  # 12-delta ≈ 3% OTM for SPY

  # Legacy range filter — kept for backward compat; ignored when use_delta_selection: true
  min_delta: 0.20
  max_delta: 0.30

  # Spread width: $5 wide (validated in backtests)
  spread_width: 5
  spread_width_high_iv: 10
  spread_width_low_iv: 5

  # Direction: both (sell bull-puts in bull/neutral, bear-calls in bear/neutral)
  direction: both

  # IV Rank filters
  min_iv_rank: 12
  min_iv_percentile: 12

  # Iron condor parameters — exp_154: IC-in-NEUTRAL-only, 12% risk per IC
  iron_condor:
    enabled: true
    ic_neutral_regime_only: true      # Only deploy ICs when regime=NEUTRAL
    ic_risk_per_trade: 12.0           # 12% risk for ICs (both legs must simultaneously hit max loss)
    prefer_in_low_iv: false
    low_iv_threshold: 30
    min_combined_credit_pct: 8        # exp_154: ic_min_combined_credit_pct=8
    max_wing_width: 10
    rsi_min: 30
    rsi_max: 70

  # Regime detection: combo v2 (price_vs_ma200 + rsi_momentum + vix_structure)
  # Note: full combo regime wiring is pending live code update; MA200 filter active now
  regime_mode: combo
  regime_config:
    signals:
      - price_vs_ma200
      - rsi_momentum
      - vix_structure
    ma_slow_period: 200
    ma200_neutral_band_pct: 0.5
    rsi_period: 14
    rsi_bull_threshold: 55.0
    rsi_bear_threshold: 45.0
    vix_structure_bull: 0.95
    vix_structure_bear: 1.05
    bear_requires_unanimous: true
    cooldown_days: 3
    vix_extreme: 40.0

  # Technical filters
  technical:
    use_trend_filter: true
    use_rsi_filter: true
    use_support_resistance: true

    fast_ma: 20
    slow_ma: 200  # MA200 trend filter

    rsi_period: 14
    rsi_oversold: 30
    rsi_overbought: 70

# Risk Management
risk:
  # Account size (USD)
  account_size: 100000

  # exp_154: 5% flat risk per directional spread
  # IC trades use ic_risk_per_trade=12% (see strategy.iron_condor above)
  max_risk_per_trade: 5.0

  # Flat sizing (compound: false in backtest)
  sizing_mode: flat

  # Contract limits
  min_contracts: 1
  max_contracts: 25

  max_positions: 50
  max_positions_per_ticker: 2

  scan_days: [0, 1, 2, 3, 4]

  # exp_154: profit_target=50%, stop_loss_multiplier=3.5x
  profit_target: 50
  stop_loss_pct_of_width: 75
  stop_loss_multiplier: 3.5

  delta_threshold: 0.30

  # exp_154: min_credit_pct=8%
  min_credit_pct: 8

  # Portfolio-level risk limits
  portfolio_risk:
    max_portfolio_risk_pct: 40
    max_single_ticker_pct: 16
    max_same_expiration: 4

  correlation_groups:
    equity_indices:
      tickers: [SPY, QQQ, IWM]
      max_correlated_positions: 5

  # exp_154 backtest: drawdown_cb_pct=35 (MC-validated)
  drawdown_cb_pct: 35

  enable_rolling: false
  max_rolls_per_position: 0
  min_roll_credit: 0.30

# Alert Settings
alerts:
  output_json: true
  output_text: true
  output_csv: true

  json_file: "alerts.json"
  text_file: "alerts.txt"
  csv_file: "alerts.csv"

  telegram:
    enabled: true
    bot_token: "${TELEGRAM_BOT_TOKEN}"
    chat_id: "${TELEGRAM_CHAT_ID}"

# Alpaca Paper Trading — EXP-154 account PA3UNOV58WGK
alpaca:
  enabled: true
  api_key: "${ALPACA_API_KEY}"
  api_secret: "${ALPACA_API_SECRET}"
  paper: true

# Data Settings
data:
  provider: "polygon"

  tradier:
    api_key: "${TRADIER_API_KEY}"

  polygon:
    api_key: "${POLYGON_API_KEY}"
    sandbox: true

  backtest_lookback: 365
  use_cache: true
  cache_expiry_minutes: 15

# Logging
logging:
  level: "INFO"
  file: "logs/trading_exp154.log"
  console: true

# Backtesting
backtest:
  starting_capital: 100000
  commission_per_contract: 0.65
  slippage: 0.05
  exit_slippage: 0.10
  score_threshold: 25
  generate_reports: true
  report_dir: "output/backtest_reports"
