# ============================================================================
# paper_exp154.yaml — Paper Trading Config
# ============================================================================
# Experiment: exp_154 (5% flat risk, IC 12% risk, stop 3.5x, combo regime)
# Base strategy: configs/exp_154_risk5_icr12_sl35.json
# Capital: SPY only
#
# Usage:
#   python main.py scheduler --config configs/paper_exp154.yaml \
#                            --env-file .env.local
#
# Required env vars (from .env.local):
#   ALPACA_API_KEY
#   ALPACA_API_SECRET
#   TELEGRAM_BOT_TOKEN
#   TELEGRAM_CHAT_ID
#   POLYGON_API_KEY
# ============================================================================

# --- Paper trading safety flags ---
paper_mode: true          # SAFETY: blocks live API URLs when true
db_path: "data/pilotai_exp154.db"   # Isolated DB — prevents cross-contamination with other experiments

tickers:
  - SPY

# ============================================================================
# Strategy (exp_154 params: 5% flat risk, IC neutral-only, combo regime)
# ============================================================================
strategy:
  min_dte: 25
  max_dte: 45
  target_dte: 35

  manage_dte: 0    # DISABLED — backtester holds to expiration/stop/PT; live must match

  direction: both

  use_delta_selection: false
  target_delta: 0.12
  min_delta: 0.20
  max_delta: 0.30
  otm_pct: 0.03

  spread_width: 5
  spread_width_high_iv: 10
  spread_width_low_iv: 5

  min_iv_rank: 0
  min_iv_percentile: 0

  min_credit_pct: 8

  iron_condor:
    enabled: true
    min_combined_credit_pct: 8    # exp_154: 8% combined credit floor
    max_wing_width: 10
    ic_risk_per_trade: 12.0       # exp_154: IC risk = 12%
    ic_neutral_regime_only: true  # IC only fires in NEUTRAL regime

  # Technical filters
  technical:
    use_trend_filter: true
    use_rsi_filter: true
    use_support_resistance: true
    fast_ma: 20
    slow_ma: 200
    rsi_period: 14
    rsi_oversold: 30
    rsi_overbought: 70

  # Combo regime detector (exp_154 uses regime_mode: combo)
  regime_mode: combo
  regime_config:
    signals:
      - price_vs_ma200
      - rsi_momentum
      - vix_structure
    ma_slow_period: 200
    ma200_neutral_band_pct: 0.5
    rsi_period: 14
    rsi_bull_threshold: 55.0
    rsi_bear_threshold: 45.0
    vix_structure_bull: 0.95
    vix_structure_bear: 1.05
    bear_requires_unanimous: true
    cooldown_days: 3
    vix_extreme: 40.0
  neutral_band: 0.5

  trend_ma_period: 200

# ============================================================================
# Risk Management (exp_154 params)
# ============================================================================
risk:
  account_size: 100000

  # Directional spread risk: 5% per trade (exp_154 base param)
  # IC risk: 12% per trade (strategy.iron_condor.ic_risk_per_trade, read by alert_position_sizer)
  # max_risk_per_trade is used by BOTH the risk gate cap AND the sizer for regular spreads.
  # Must be set to the higher IC value (12%) so the risk gate doesn't block IC trades.
  # Trade-off: live regular spreads are sized at 12% instead of the backtested 5%.
  # A code change to add a separate directional_risk_per_trade config key would fix this.
  risk_per_trade: 5.0          # documents intended directional spread risk (not read by any code path yet)
  max_risk_per_trade: 12.0     # risk gate cap — must be ≥ ic_risk_per_trade (12%) or ICs are blocked
  sizing_mode: flat

  # No compounding (exp_154 param)
  compound: false

  min_contracts: 1
  max_contracts: 25

  max_positions: 50
  max_positions_per_ticker: 2

  scan_days: [0, 1, 2, 3, 4]

  profit_target: 50
  stop_loss_multiplier: 3.5
  stop_loss_pct_of_width: 75

  delta_threshold: 0.30
  min_credit_pct: 8

  drawdown_cb_pct: 35
  cooldown_bars: 3

  enable_rolling: false
  max_rolls_per_position: 0
  min_roll_credit: 0.30

# ============================================================================
# Scheduler
# ============================================================================
scheduler:
  scan_interval: 1800      # 30-minute scans

# ============================================================================
# Alpaca Paper Trading
# ============================================================================
alpaca:
  enabled: true
  paper: true
  base_url: "https://paper-api.alpaca.markets"
  api_key: "${ALPACA_API_KEY}"
  api_secret: "${ALPACA_API_SECRET}"

# ============================================================================
# Alert Settings
# ============================================================================
alerts:
  output_json: true
  output_text: true
  output_csv: true
  json_file: "alerts_exp154.json"
  text_file: "alerts_exp154.txt"
  csv_file: "alerts_exp154.csv"

  telegram:
    enabled: true
    bot_token: "${TELEGRAM_BOT_TOKEN}"
    chat_id: "${TELEGRAM_CHAT_ID}"

# ============================================================================
# Data Settings
# ============================================================================
data:
  provider: "polygon"
  polygon:
    api_key: "${POLYGON_API_KEY}"
    sandbox: false
  backtest_lookback: 365
  use_cache: true
  cache_expiry_minutes: 15

# ============================================================================
# Logging
# ============================================================================
logging:
  level: "INFO"
  file: "logs/paper_exp154.log"
  console: true

# ============================================================================
# Backtesting (exp_154 validated params)
# ============================================================================
backtest:
  starting_capital: 100000
  commission_per_contract: 0.65
  slippage: 0.05
  exit_slippage: 0.10
  score_threshold: 25
  generate_reports: true
  report_dir: "output/backtest_reports"
