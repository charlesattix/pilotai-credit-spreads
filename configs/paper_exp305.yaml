# ============================================================================
# paper_exp305.yaml — COMPASS Portfolio Paper Trading Config
# ============================================================================
# Experiment: exp_305 (top-2 sectors at 65% threshold)
# Base strategy: exp_126 (8% flat risk, 8% IC, ic_neutral_regime_only=true)
# Capital split: SPY 65% + top-2 sectors 35% (split evenly)
#
# Usage:
#   python main.py scheduler --config configs/paper_exp305.yaml \
#                            --env-file .env.exp305
#
# Required env vars:
#   APCA_PAPER_API_KEY    — Alpaca paper trading API key
#   APCA_PAPER_SECRET_KEY — Alpaca paper trading API secret
#   TELEGRAM_BOT_TOKEN
#   TELEGRAM_CHAT_ID
#   POLYGON_API_KEY
# ============================================================================

# --- Paper trading safety flags ---
paper_mode: true          # SAFETY: blocks live API URLs when true (see main.py)

# Tickers: SPY is always included. Sector ETFs injected at runtime by CC1
# based on COMPASS universe selection.
tickers:
  - SPY

# ============================================================================
# COMPASS Portfolio Configuration
# ============================================================================
compass:
  universe_enabled: true          # Enable dynamic multi-underlying selection
  rrg_filter: true                # Block bull-puts for Lagging/Weakening sectors
  min_leading_pct: 0.65           # Strict: only "Leading" quadrant eligible
  portfolio_mode: true

  # Capital allocation: SPY gets 65%, sectors share the remaining 35%
  portfolio_weights:
    spy_pct: 0.65       # 65% of account allocated to SPY
    sector_pct: 0.35    # 35% split evenly among active sectors (e.g., 17.5% each for 2)

  # Active sectors — CC1 overwrites this list at scan time based on COMPASS
  # universe selection (top-2 sectors meeting 65% leading_pct threshold).
  # Pre-populating with exp_305 2025 defaults (SOXX, XLK, XLC).
  active_sectors:
    - SOXX
    - XLK

  # Universe selection threshold (must match run_portfolio_backtest.py)
  leading_pct_threshold: 0.65

  # Portfolio risk limits (COMPASS-specific)
  portfolio_risk_limits:
    # Maximum total portfolio delta exposure as % of account (across all underlyings)
    max_total_delta_pct: 0.30    # No more than 30% of account in net directional risk

    # No single sector ETF can exceed this % of portfolio capital
    max_single_sector_pct: 0.40  # 40% cap per sector (allows 35% + buffer)

    # Correlated sector groups: combined exposure capped together
    correlated_sector_groups:
      tech_consumer:
        tickers: [XLK, XLY, XLC, SOXX]
        max_combined_pct: 0.40   # XLK+XLY+XLC+SOXX together ≤ 40%
      financials_cyclical:
        tickers: [XLF, XLI]
        max_combined_pct: 0.25   # XLF+XLI together ≤ 25%

# ============================================================================
# Strategy (exp_126 params: 8% flat risk, ic_neutral_regime_only)
# ============================================================================
strategy:
  min_dte: 25
  max_dte: 45
  target_dte: 35

  manage_dte: 21

  # Direction: both (SPY uses combo regime; sector ETFs use RRG quadrant direction)
  direction: both

  # Delta-based strike selection
  use_delta_selection: false
  target_delta: 0.12
  min_delta: 0.20
  max_delta: 0.30

  # Spread width: $5 wide (validated by 2024 sweep)
  spread_width: 5
  spread_width_high_iv: 10
  spread_width_low_iv: 5

  # IV Rank filters
  min_iv_rank: 12
  min_iv_percentile: 12

  # Iron condor — exp_126 IC-in-NEUTRAL mode
  iron_condor:
    enabled: true
    prefer_in_low_iv: true
    low_iv_threshold: 30
    min_combined_credit_pct: 8   # exp_126: 8% combined credit floor
    max_wing_width: 10
    rsi_min: 45                  # exp_126: combo regime RSI bands
    rsi_max: 55
    ic_risk_per_trade: 8.0       # exp_126: IC risk = 8% (same as directional)
    ic_neutral_regime_only: true # CORE: IC only fires in NEUTRAL regime

  # Technical filters
  technical:
    use_trend_filter: true
    use_rsi_filter: true
    use_support_resistance: true
    fast_ma: 20
    slow_ma: 200
    rsi_period: 14
    rsi_oversold: 30
    rsi_overbought: 70

  # Regime detection
  regime_mode: combo             # SPY uses combo regime detector
  regime_config:
    signals:
      - price_vs_ma200
      - rsi_momentum
      - vix_structure
    ma_slow_period: 200
    ma200_neutral_band_pct: 0.5
    rsi_period: 14
    rsi_bull_threshold: 55.0
    rsi_bear_threshold: 45.0
    vix_structure_bull: 0.95
    vix_structure_bear: 1.05
    bear_requires_unanimous: true
    cooldown_days: 3
    vix_extreme: 40.0
  neutral_band: 0.5              # ±0.5% neutral band for regime classification

  # Sector ETFs use MA regime (not combo)
  sector_regime_mode: ma

# ============================================================================
# Risk Management (exp_126 params)
# ============================================================================
risk:
  account_size: 100000

  # 8% flat risk per trade (exp_126 key param)
  max_risk_per_trade: 8.0

  # Sizing mode: flat = always uses starting_capital as base
  sizing_mode: flat

  # Contract limits
  min_contracts: 1
  max_contracts: 25

  # Position limits
  max_positions: 50
  max_positions_per_ticker: 2

  scan_days: [0, 1, 2, 3, 4]

  # Profit target
  profit_target: 50

  # Stop loss: 3.5x credit (exp_126)
  stop_loss_multiplier: 3.5
  stop_loss_pct_of_width: 75

  delta_threshold: 0.30

  # Minimum credit: 8% of spread width
  min_credit_pct: 8

  # Portfolio-level risk limits (base config)
  portfolio_risk:
    max_portfolio_risk_pct: 40
    max_single_ticker_pct: 16
    max_same_expiration: 4

  # Correlation groups (base equity indices)
  correlation_groups:
    equity_indices:
      tickers: [SPY, QQQ, IWM]
      max_correlated_positions: 5

  # Drawdown circuit breaker: exp_126 uses 30% CB
  drawdown_cb_pct: 30

  # Cooldown: 3 bars after CB fires before re-entry
  cooldown_bars: 3

  # No rolling
  enable_rolling: false
  max_rolls_per_position: 0
  min_roll_credit: 0.30

# ============================================================================
# Alpaca Paper Trading (COMPASS exp_305)
# ============================================================================
alpaca:
  enabled: true
  paper: true                          # MUST be true for paper_mode config
  base_url: "https://paper-api.alpaca.markets"  # Paper endpoint (safety check validates this)
  api_key: "${ALPACA_API_KEY}"
  api_secret: "${ALPACA_API_SECRET}"

# ============================================================================
# Alert Settings
# ============================================================================
alerts:
  output_json: true
  output_text: true
  output_csv: true
  json_file: "alerts_exp305.json"
  text_file: "alerts_exp305.txt"
  csv_file: "alerts_exp305.csv"

  telegram:
    enabled: true
    bot_token: "${TELEGRAM_BOT_TOKEN}"
    chat_id: "${TELEGRAM_CHAT_ID}"

# ============================================================================
# Data Settings
# ============================================================================
data:
  provider: "polygon"
  polygon:
    api_key: "${POLYGON_API_KEY}"
    sandbox: false   # Production data for live paper trading
  tradier:
    api_key: "${TRADIER_API_KEY}"
  backtest_lookback: 365
  use_cache: true
  cache_expiry_minutes: 15

# ============================================================================
# Logging
# ============================================================================
logging:
  level: "INFO"
  file: "logs/paper_exp305.log"
  console: true

# ============================================================================
# Backtesting (exp_126/exp_305 validated params)
# ============================================================================
backtest:
  starting_capital: 100000
  commission_per_contract: 0.65
  slippage: 0.05
  exit_slippage: 0.10
  score_threshold: 25
  generate_reports: true
  report_dir: "output/backtest_reports"
