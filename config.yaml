# PilotAI Credit Spreads — Paper Trading Configuration
# Uses champion config (walk-forward validated, 3/3 OOS folds profitable)
# Secrets use ${ENV_VAR} substitution from .env

# --- Tickers to scan ---
tickers:
  - SPY
  - QQQ
  - IWM

# --- Strategy parameters (from champion config) ---
strategy:
  # Credit spread (bull put) — primary strategy
  min_dte: 12
  max_dte: 30
  min_delta: 0.08
  max_delta: 0.20
  spread_width: 12.0
  profit_target_pct: 0.55
  stop_loss_multiplier: 1.25

  # Technical analysis filters
  technical:
    use_trend_filter: true
    use_rsi_filter: true
    use_support_resistance: true
    fast_ma: 20
    slow_ma: 50
    rsi_period: 14
    rsi_oversold: 30
    rsi_overbought: 70

  # Iron condor sub-strategy
  iron_condor:
    enabled: true
    rsi_min: 35
    rsi_max: 60
    min_combined_credit_pct: 25
    prefer_in_low_iv: true
    low_iv_threshold: 30

# --- Risk management ---
risk:
  account_size: 100000
  max_risk_per_trade: 5.0
  max_positions: 8
  profit_target: 55
  stop_loss_multiplier: 1.25

# --- Alpaca paper trading ---
alpaca:
  enabled: true
  api_key: ${ALPACA_API_KEY}
  api_secret: ${ALPACA_SECRET_KEY}
  base_url: ${ALPACA_BASE_URL}
  paper: true

# --- Alerts ---
alerts:
  min_score: 28
  max_alerts: 5
  telegram:
    enabled: false
    bot_token: ${TELEGRAM_BOT_TOKEN}
    chat_id: ${TELEGRAM_CHAT_ID}

# --- Data providers ---
data:
  provider: polygon
  polygon:
    api_key: ${POLYGON_API_KEY}

# --- Logging ---
logging:
  level: INFO
  file: logs/pilotai.log
  console: true

# --- Backtest (required by validate_config) ---
backtest:
  start_date: "2020-01-01"
  end_date: "2025-12-31"
  initial_capital: 100000
