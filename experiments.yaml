# =============================================================================
# experiments.yaml — PilotAI Paper Trading Experiment Registry
# =============================================================================
# SOURCE OF TRUTH for: experiment name ↔ env file ↔ config ↔ Alpaca account
#                       ↔ tmux session ↔ status ↔ SQLite DB
#
# Statuses:
#   active   — currently running (has a live tmux session + active process)
#   stopped  — account exists, process not running (can be restarted)
#   archived — experiment concluded, account may be reset or decommissioned
#
# DO NOT edit account IDs or env_file paths without also rotating/updating
# the corresponding Alpaca paper account and .env.* file.
# =============================================================================

